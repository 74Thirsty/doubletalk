<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vantage Chatbot Console</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="layout">
<section class="card config">
<h1>Vantage Chatbot</h1>
<p>Local web client for the FastAPI bot.</p>
<label for="tenant">Tenant ID</label>
<input id="tenant" type="number" min="1" value="1" />
<label for="api">API Base URL</label>
<input id="api" type="url" value="http://localhost:8000" />
<button id="reset">Reset Session</button>
<small id="session"></small>
</section>

<section class="card chat">
<div id="messages" class="messages" aria-live="polite"></div>
<form id="chat-form" class="composer">
<input id="message-input" type="text" placeholder="Type a message" autocomplete="off" required />
<button type="submit">Send</button>
</form>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
